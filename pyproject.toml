[project]
name = "python-aws-monorepo-boilerplate"
version = "0.1.0"
requires-python = ">=3.13"

[tool.uv.workspace]
members = ["packages/*", "lambdas/*", "infra"]

[dependency-groups]
dev = [
    "ruff>=0.9.0",
    "mypy>=1.13.0",
    "pytest>=8.0.0",
    "pytest-cov>=5.0.0",
    "boto3-stubs[lambda,apigateway]>=1.35.0",
]

[tool.pytest.ini_options]
testpaths = [
    "packages/shared/tests",
    "lambdas/hello/tests",
]
