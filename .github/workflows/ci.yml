name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: make install

      - name: Ruff lint
        run: make lint

      - name: Ruff format check
        run: make format

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: make install

      - name: mypy
        run: make typecheck

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: make install

      - name: Run tests
        run: make test-coverage

  cdk-synth:
    name: CDK Synth
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version-file: .python-version

      - name: Set up Node.js (for CDK CLI)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up AWS CDK CLI
        run: npm install -g aws-cdk

      - name: Install dependencies
        run: make install

      - name: CDK Synth
        run: make cdk-synth
