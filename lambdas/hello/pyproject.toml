[project]
name = "hello"
version = "0.1.0"
description = "Example Hello World Lambda function behind API Gateway"
requires-python = ">=3.13"
dependencies = [
    "shared",
]

[tool.uv.sources]
shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hello"]
