# Target the same Python version as .python-version / pyproject.toml
target-version = "py313"
line-length = 88

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade
    "ANN",  # flake8-annotations (type hints)
    "S",    # flake8-bandit (security)
    "SIM",  # flake8-simplify
    "RUF",  # Ruff-specific rules
]
ignore = [
    "S101",  # assert is fine in tests and CDK constructs
]

[lint.per-file-ignores]
# Relax annotation and security rules in tests — they add noise without value there
"**/tests/**" = ["ANN", "S"]
# ANN401 (Any return type) is common in CDK infrastructure code
"infra/**" = ["ANN401"]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
